<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Evertale Optimizer • Test Catalog V2</title>
  <link rel="preconnect" href="https://ik.imagekit.io" crossorigin />
  <link rel="dns-prefetch" href="https://ik.imagekit.io" />
  <link rel="stylesheet" href="./style.css?v=1770583861" />
  <link rel="stylesheet" href="./element-watermark.css?v=1" />
  <link rel="stylesheet" href="./test-catalog-v2.css?v=2" />
  <link rel="stylesheet" href="./test-catalog-v2-elements.css?v=4" />
  <link rel="stylesheet" href="./test-catalog-v2-theme.css?v=2" />
  <link rel="stylesheet" href="./test-catalog-v2-mobile.css?v=2" />
  <link rel="stylesheet" href="./test-catalog-v2-skill-expand.css?v=1" />
  <link rel="stylesheet" href="./test-catalog-v2-layout-refine.css?v=2" />
  <link rel="stylesheet" href="./test-catalog-v2-visual-fix.css?v=1" />
</head>
<body class="page-catalog page-catalog-v2 mobile-compact">
  <header class="topbar">
    <div class="topbar-inner">
      <div>
        <div class="brandTitle">DUO Catalog V2</div>
        <div class="brandSub">Preview layout • rebuilt bundle data</div>
      </div>
      <nav class="tabs">
        <a class="tab active" href="./test-catalog-v2.html">Test V2</a>
        <a class="tab" href="./test-catalog.html">Test V1</a>
        <a class="tab" href="./index.html">Live Catalog</a>
        <a class="tab" href="./optimizer.html">Optimizer</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <div class="v2-shell">
      <aside class="v2-sidebar">
        <div class="v2-side-title">Filters</div>
        <div class="controls">
          <input id="catalogSearch" class="input" type="search" placeholder="Search characters, weapons, accessories, bosses..." />
          <select id="catalogType" class="input" aria-label="Catalog type">
            <option value="all">All</option>
            <option value="characters">Characters</option>
            <option value="weapons">Weapons</option>
            <option value="accessories">Accessories</option>
            <option value="bosses">Bosses</option>
          </select>
          <select id="catalogSort" class="input" aria-label="Catalog sort">
            <option value="newest">Newest Added</option>
            <option value="oldest">Oldest Added</option>
            <option value="az">A–Z</option>
            <option value="za">Z–A</option>
          </select>
          <button id="viewToggle" class="btn" type="button">View: Compact</button>
        </div>
      </aside>

      <section class="v2-main">
        <section class="v2-hero">
          <div class="v2-panel v2-selected-card">
            <div class="v2-feature-art" id="v2FeatureArt"><div class="v2-feature-empty">Select an entry</div></div>
            <div class="v2-feature-info">
              <div class="v2-kicker" id="v2Kind">Catalog Preview</div>
              <div class="v2-name" id="v2Name">Loading...</div>
              <div class="v2-title" id="v2Title">Choose a card below</div>
              <div class="v2-pill-row" id="v2Pills"></div>
              <div class="v2-stats">
                <div class="v2-stat"><span>HP</span><b id="v2Hp">—</b></div>
                <div class="v2-stat"><span>ATK</span><b id="v2Atk">—</b></div>
                <div class="v2-stat"><span>SPD</span><b id="v2Spd">—</b></div>
                <div class="v2-stat"><span>COST</span><b id="v2Cost">—</b></div>
              </div>
            </div>
          </div>
          <div class="v2-panel v2-description">
            <div class="v2-desc-head"><h2>Descriptions</h2><div class="v2-awaken-tabs" id="v2AwakenTabs"></div></div>
            <div class="v2-desc-text" id="v2Desc">Descriptions will follow the selected state here.</div>
          </div>
        </section>

        <section class="v2-grid-panel">
          <div class="v2-grid-head"><h2>Catalog</h2><div><span id="statusText">Loading...</span> <span class="v2-count" id="v2Count"></span></div></div>
          <div id="catalogGrid" class="rosterGrid"></div>
          <div class="footerHint">Test page only.</div>
        </section>
      </section>
    </div>
  </main>

  <script>window.EVERTALE_LIVE_CONFIG=Object.assign({},window.EVERTALE_LIVE_CONFIG||{dataVersion:'1780518798',cacheMode:'default',bundleCacheMode:'default',mapCacheMode:'default'});</script>
  <script defer src="./seasonal-theme.js?v=2"></script>
  <script defer src="./site-menu.js?v=2"></script>
  <script defer src="./image-cache-reset.js?v=1"></script>
  <script defer src="./live-data-config.js?v=3"></script>
  <script defer src="./data-loader.js?v=3"></script>
  <script defer src="./catalog-v2-lite.js?v=5"></script>
  <script defer src="./test-catalog-v2-duo-merge.js?v=1"></script>
  <script defer src="./test-catalog-v2.js?v=5"></script>
</body>
</html>
