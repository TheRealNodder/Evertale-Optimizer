  <style id="v2-hard-desktop-layout-lock">
    @media (min-width:821px){
      body.page-catalog-v2 #catalogGrid{grid-template-columns:repeat(auto-fill,minmax(320px,1fr))!important;gap:16px!important;}
      body.page-catalog-v2 #catalogGrid .unitCard{display:flex!important;flex-direction:column!important;grid-template-columns:none!important;gap:12px!important;min-height:560px!important;padding:14px 14px 14px 18px!important;}
      body.page-catalog-v2 #catalogGrid .unitCard>.unitLeft{display:block!important;width:100%!important;min-width:0!important;margin:0!important;}
      body.page-catalog-v2 #catalogGrid .unitCard .unitThumb{display:block!important;width:100%!important;height:clamp(300px,28vw,430px)!important;min-height:300px!important;border-radius:20px!important;overflow:hidden!important;position:relative!important;}
      body.page-catalog-v2 #catalogGrid .unitCard .unitThumb img{width:100%!important;height:100%!important;max-height:none!important;object-fit:cover!important;object-position:center top!important;display:block!important;}
      body.page-catalog-v2 #catalogGrid .unitCard .unitThumb::after{top:10px!important;right:10px!important;width:64px!important;height:64px!important;}
      body.page-catalog-v2 #catalogGrid .unitCard>.meta{display:flex!important;flex-direction:column!important;flex:1 1 auto!important;width:100%!important;min-width:0!important;gap:10px!important;padding:0!important;}
      body.page-catalog-v2 #catalogGrid .unitCard .metaHeader{display:flex!important;flex-direction:column!important;width:100%!important;gap:10px!important;}
      body.page-catalog-v2 #catalogGrid .unitCard .metaMain{display:flex!important;flex-direction:column!important;align-items:center!important;justify-content:center!important;text-align:center!important;width:100%!important;}
      body.page-catalog-v2 #catalogGrid .unitCard .nameBlock{display:block!important;width:100%!important;text-align:center!important;}
      body.page-catalog-v2 #catalogGrid .unitCard .v2-detail-btn,
      body.page-catalog-v2 #catalogGrid .unitCard .v2-detail-backdrop{display:none!important;}
      body.page-catalog-v2 #catalogGrid .unitCard .unitName{text-align:center!important;font-size:clamp(20px,2vw,28px)!important;line-height:1.08!important;margin:0 auto!important;}
      body.page-catalog-v2 #catalogGrid .unitCard .unitTitle{text-align:center!important;font-size:clamp(14px,1.2vw,17px)!important;line-height:1.22!important;margin:3px auto 0!important;max-width:94%!important;display:block!important;}
      body.page-catalog-v2 #catalogGrid .unitCard .stateRow{display:flex!important;flex-direction:row!important;justify-content:center!important;align-items:center!important;gap:8px!important;margin-top:10px!important;width:100%!important;}
      body.page-catalog-v2 #catalogGrid .unitCard .duoFormBtn{align-self:center!important;margin:8px auto 0!important;max-width:190px!important;}
      body.page-catalog-v2 #catalogGrid .unitCard .chipCol{display:flex!important;flex-direction:row!important;justify-content:center!important;align-items:center!important;gap:8px!important;width:100%!important;max-width:none!important;margin-top:10px!important;}
      body.page-catalog-v2 #catalogGrid .unitCard .chipCol .tag{flex:1 1 0!important;min-width:0!important;text-align:center!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important;}
      body.page-catalog-v2 #catalogGrid .unitCard .unitDetails{margin-top:auto!important;width:100%!important;display:block!important;}
      body.page-catalog-v2 #catalogGrid .unitCard .statLine{display:grid!important;grid-template-columns:repeat(4,minmax(0,1fr))!important;gap:7px!important;width:100%!important;padding:8px!important;margin:0!important;}
      body.page-catalog-v2 #catalogGrid .unitCard .stat{display:flex!important;flex-direction:column!important;align-items:center!important;justify-content:center!important;min-width:0!important;text-align:center!important;}
      body.page-catalog-v2 #catalogGrid .unitCard .leaderBlock{display:none!important;}

<body class="page-catalog page-catalog-v2 mobile-compact">
  <header class="topbar">
    <div class="topbar-inner">
      <div>
        <div class="brandTitle">DUO Catalog V2</div>
        <div class="brandSub">Preview layout • rebuilt bundle data</div>
      </div>
      <nav class="tabs">
        <a class="tab active" href="./test-catalog-v2.html">Test V2</a>
        <a class="tab" href="./test-catalog.html">Test V1</a>
        <a class="tab" href="./index.html">Live Catalog</a>
        <a class="tab" href="./optimizer.html">Optimizer</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <div class="v2-shell">
      <aside class="v2-sidebar">
        <div class="v2-side-title">Filters</div>
        <div class="controls">
          <input id="catalogSearch" class="input" type="search" placeholder="Search characters, weapons, accessories, bosses..." />
          <select id="catalogType" class="input" aria-label="Catalog type">
            <option value="all">All</option>
            <option value="characters">Characters</option>
            <option value="weapons">Weapons</option>
            <option value="accessories">Accessories</option>
            <option value="bosses">Bosses</option>
          </select>
          <select id="catalogSort" class="input" aria-label="Catalog sort">
            <option value="newest">Newest Added</option>
            <option value="oldest">Oldest Added</option>
            <option value="az">A–Z</option>
            <option value="za">Z–A</option>
          </select>
          <button id="viewToggle" class="btn" type="button">View: Compact</button>
        </div>
      </aside>

      <section class="v2-main">
        <section class="v2-hero">
          <div class="v2-panel v2-selected-card">
            <div class="v2-feature-art" id="v2FeatureArt"><div class="v2-feature-empty">Select an entry</div></div>
            <div class="v2-feature-info">
              <div class="v2-kicker" id="v2Kind">Catalog Preview</div>
              <div class="v2-name" id="v2Name">Loading...</div>
              <div class="v2-title" id="v2Title">Choose a card below</div>
              <div class="v2-pill-row" id="v2Pills"></div>
              <div class="v2-stats">
                <div class="v2-stat"><span>HP</span><b id="v2Hp">—</b></div>
                <div class="v2-stat"><span>ATK</span><b id="v2Atk">—</b></div>
                <div class="v2-stat"><span>SPD</span><b id="v2Spd">—</b></div>
                <div class="v2-stat"><span>COST</span><b id="v2Cost">—</b></div>
              </div>
            </div>
          </div>
          <div class="v2-panel v2-description">
            <div class="v2-desc-head"><h2>Descriptions</h2><div class="v2-awaken-tabs" id="v2AwakenTabs"></div></div>
            <div class="v2-desc-text" id="v2Desc">Descriptions will follow the selected state here.</div>
          </div>
        </section>

        <section class="v2-grid-panel">
          <div class="v2-grid-head"><h2>Catalog</h2><div><span id="statusText">Loading...</span> <span class="v2-count" id="v2Count"></span></div></div>
          <div id="catalogGrid" class="rosterGrid"></div>
          <div class="footerHint">Test page only.</div>
        </section>
      </section>
    </div>
  </main>
