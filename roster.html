<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Evertale Optimizer</title>
  <link rel="stylesheet" href="./style.css?v=1770741090" />
  <link rel="stylesheet" href="./element-watermark.css?v=1" />
  <link rel="stylesheet" href="./v2-site-ui-pass.css?v=4" />
  <link rel="stylesheet" href="./v2-roster-decramp.css?v=7" />
  <link rel="stylesheet" href="./v2-roster-progression-linefix.css?v=1" />
</head>
<body class="page-roster-v2">
  <header class="topbar">
    <div class="topbar-inner">
      <div>
        <div class="brandTitle">Evertale Optimizer</div>
        <div class="brandSub">Made By TheRealNodder for Everyone!</div>
      </div>

      <nav class="tabs">
        <a class="tab" href="./index.html">Catalog</a>
        <a class="tab active" href="./roster.html">Roster</a>
        <a class="tab" href="./optimizer.html">Optimizer</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <div class="v2-shell v2-roster-shell">
      <aside class="v2-sidebar v2-roster-sidebar">
        <div class="v2-side-title">Roster Filters</div>
        <div class="controls">
          <input id="searchInput" class="input" type="search" placeholder="Search name/title/element/rarity..." />

          <select id="elementSelect" class="input">
            <option value="all">All Elements</option>
            <option value="Fire">Fire</option>
            <option value="Water">Water</option>
            <option value="Storm">Storm</option>
            <option value="Earth">Earth</option>
            <option value="Light">Light</option>
            <option value="Dark">Dark</option>
          </select>

          <select id="raritySelect" class="input">
            <option value="all">All Rarities</option>
            <option value="N">N</option>
            <option value="R">R</option>
            <option value="SR">SR</option>
            <option value="SSR">SSR</option>
          </select>

          <button id="viewToggle" class="btn" type="button">View: Compact</button>
          <button id="deselectAll" class="btn" type="button">Deselect All</button>
          <a class="btn" href="./optimizer.html" style="text-decoration:none; display:inline-flex; align-items:center;">Go to Optimizer</a>
        </div>

        <div class="controls v2-roster-planning-controls">
          <select id="teamTypeSelect" class="input">
            <option value="auto">Team Type: Auto</option>
            <option value="mono">Team Type: Mono</option>
            <option value="rainbow">Team Type: Rainbow</option>
          </select>

          <select id="presetSelect" class="input">
            <option value="auto">Preset: Auto</option>
            <option value="burn">Preset: Burn</option>
            <option value="poison">Preset: Poison</option>
            <option value="sleep">Preset: Sleep</option>
            <option value="stun">Preset: Stun</option>
            <option value="heal">Preset: Heal</option>
            <option value="turn">Preset: Turn</option>
            <option value="atkBuff">Preset: ATK Buff</option>
            <option value="hpBuff">Preset: HP Buff</option>
            <option value="cleanse">Preset: Cleanse</option>
          </select>

          <div class="muted" style="align-self:center;">
            Used by Optimizer page.
          </div>
        </div>
      </aside>

      <section class="v2-main">
        <section class="v2-grid-panel v2-roster-grid-panel">
          <div class="v2-grid-head">
            <h2>Roster</h2>
            <div class="muted">Owned unit planning</div>
          </div>
          <div id="statusText"></div>
          <div id="unitGrid" class="rosterGrid"></div>

          <div class="footerHint">
            Compact: multi-column, tap card to expand.<br/>
            Detailed: 1 per row, always expanded.
          </div>
        </section>
      </section>
    </div>
  </main>

  <script src="./seasonal-theme.js?v=7"></script>
  <script src="./site-menu.js?v=10"></script>
  <script src="./theme-auto-route-authority.js?v=1"></script>
  <script src="./live-data-config.js?v=4"></script>
  <script src="./data-loader.js?v=4"></script>
  <script src="./leader-skill-resolver.js?v=1"></script>
  <script src="./duo-source-collapse.js?v=2"></script>
  <script src="./duo-display.js?v=1"></script>
  <script src="./runtime-stat-engine.js?v=2"></script>
  <script src="./roster-profile-store.js?v=3"></script>
  <script src="./app.js?v=1770082379"></script>
  <script src="./roster-profile-ui.js?v=3"></script>
</body>
</html>
