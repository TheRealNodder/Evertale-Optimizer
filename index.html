<!doctype html>
<html lang="en">
<head>
  <link rel="icon" href="./favicon.ico" />
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Evertale Optimizer • Catalog</title>
  <link rel="stylesheet" href="./style.css?v=1770741090" />
  <link rel="stylesheet" href="./element-watermark.css?v=1" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div>
        <div class="brandTitle">Evertale Optimizer</div>
        <div class="brandSub">Catalog → Roster → Optimizer</div>
      </div>

      <nav class="tabs">
        <a class="tab active" href="./index.html">Catalog</a>
        <a class="tab" href="./roster.html">Roster</a>
        <a class="tab" href="./optimizer.html">Optimizer</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <div class="controls">
      <input id="catalogSearch" class="input" type="search" placeholder="Search characters, weapons, accessories, bosses..." />

      <select id="catalogType" class="input" aria-label="Catalog type">
        <option value="all">All</option>
        <option value="characters">Characters</option>
        <option value="weapons">Weapons</option>
        <option value="accessories">Accessories</option>
        <option value="bosses">Bosses</option>
      </select>

      <select id="catalogSort" class="input" aria-label="Catalog sort">
        <option value="newest">Newest Added</option>
        <option value="oldest">Oldest Added</option>
        <option value="az">A–Z</option>
        <option value="za">Z–A</option>
      </select>

      <button id="viewToggle" class="btn" type="button">View: Compact</button>
    </div>

    <div id="statusText">Loading...</div>

    <div id="catalogGrid" class="rosterGrid"></div>

    <div class="footerHint">
      Tip: paste a list of names in the search box (one per line) to filter quickly.
    </div>
  </main>

  <script src="./seasonal-theme.js"></script>
  <script src="./site-menu.js"></script>
  <script src="./image-cache-reset.js?v=1"></script>
  <script src="./live-data-config.js?v=4"></script>
  <script src="./data-loader.js"></script>
  <script src="./leader-skill-resolver.js?v=1"></script>
  <script src="./duo-source-collapse.js?v=4"></script>
  <script src="./catalog.js?v=1770583867"></script>
  <script src="./catalog-sort.js?v=8"></script>
  <script src="./duo-sort-bypass.js?v=3"></script>
  <script src="./catalog-state-restore.js?v=2"></script>
  <script src="./catalog-ui-align.js?v=1"></script>
</body>
</html>
