name: Evertale Master Control

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Master Control mode"
        required: true
        default: "safe_rebuild"
        type: choice
        options:
          - safe_rebuild
          - extract
          - extract_force
      full_audit:
        description: "Run full audit after rebuild"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: evertale-master-control
  cancel-in-progress: false

jobs:
  master-control:
    name: Run Master Control
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Show selected mode
        run: |
          echo "Mode: ${{ inputs.mode }}"
          echo "Full audit: ${{ inputs.full_audit }}"
          python --version
          test -f tools/new_structure/MASTER_CONTROL.py

      - name: Preflight raw APK files
        shell: bash
        run: |
          set -euo pipefail
          echo "Repository root: $(pwd)"
          echo "Root preview:"
          ls -la
          echo "apkfiles preview:"
          if [ -d apkfiles ]; then
            ls -la apkfiles
          else
            echo "ERROR: apkfiles folder is missing from this checkout."
            exit 1
          fi
          echo "Required raw files directly inside apkfiles:"
          missing=0
          for file in Monster.json Weapon.json Equipment.json Boss.json; do
            if [ -f "apkfiles/$file" ]; then
              size=$(wc -c < "apkfiles/$file")
              echo "FOUND apkfiles/$file (${size} bytes)"
            else
              echo "MISSING apkfiles/$file"
              missing=1
            fi
          done
          echo "Nearby raw file search, diagnostic only:"
          find apkfiles -maxdepth 4 -type f \( -name "Monster.json" -o -name "Weapon.json" -o -name "Equipment.json" -o -name "Boss.json" \) -print || true
          if [ "${{ inputs.mode }}" != "safe_rebuild" ] && [ "$missing" -ne 0 ]; then
            echo "ERROR: Extract modes require Monster.json, Weapon.json, Equipment.json, and Boss.json directly inside apkfiles."
            exit 1
          fi

      - name: Run Master Control
        shell: bash
        run: |
          set -euo pipefail
          MC="tools/new_structure/MASTER_CONTROL.py"

          if [ "${{ inputs.mode }}" = "safe_rebuild" ]; then
            python "$MC"
          elif [ "${{ inputs.mode }}" = "extract" ]; then
            python "$MC" --extract
          elif [ "${{ inputs.mode }}" = "extract_force" ]; then
            python "$MC" --extract --force
          else
            echo "Unknown mode: ${{ inputs.mode }}"
            exit 1
          fi

          if [ "${{ inputs.full_audit }}" = "true" ]; then
            python "$MC" --full-audit
          fi

      - name: Upload reports as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: master-control-reports
          path: |
            apkfiles/entries/reports/*.json
            apkfiles/entries/_markers/*.json
          if-no-files-found: ignore

      - name: Commit generated live data only
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Keep commits narrow. Reports/markers/raw scratch files are uploaded as artifacts or ignored.
          git add live-data-config.js 2>/dev/null || true
          git add apkfiles/entries/characters apkfiles/entries/weapons apkfiles/entries/accessories apkfiles/entries/bosses 2>/dev/null || true
          git add apkfiles/entries/bundles apkfiles/entries/maps apkfiles/entries/runtime 2>/dev/null || true
          git add apkfiles/entries/localization/localizable_groups.json apkfiles/entries/localization/leader_skill_localization.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No generated live-data changes to commit."
            exit 0
          fi

          git commit -m "Run Evertale Master Control"
          git push
