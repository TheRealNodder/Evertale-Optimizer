<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Evertale Optimizer • Test Catalog</title>
  <link rel="stylesheet" href="./style.css?v=1770583861" />
  <link rel="stylesheet" href="./element-watermark.css?v=1" />
  <style>
    :root{--tc-bg:#050510;--tc-panel:rgba(15,13,30,.82);--tc-panel2:rgba(21,17,42,.72);--tc-line:rgba(190,130,255,.25);--tc-hot:#a94cff;--tc-gold:#f5c75b;--tc-text:#f8f4ff;--tc-muted:#b9aed4}
    body{background:radial-gradient(circle at 18% 0%,rgba(151,57,255,.32),transparent 32%),radial-gradient(circle at 95% 10%,rgba(245,199,91,.16),transparent 24%),linear-gradient(180deg,#050510,#090719 38%,#050510);color:var(--tc-text)}
    .topbar{position:sticky;top:0;z-index:50;background:rgba(5,5,16,.78);backdrop-filter:blur(18px);border-bottom:1px solid var(--tc-line);box-shadow:0 12px 45px rgba(0,0,0,.38)}
    .brandTitle{font-size:22px;letter-spacing:.06em;text-transform:uppercase;color:var(--tc-gold);text-shadow:0 0 18px rgba(245,199,91,.35)}
    .brandSub{color:var(--tc-muted)}
    .tabs{gap:10px}.tab{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.035);border-radius:999px;padding:10px 16px}.tab.active{background:linear-gradient(135deg,rgba(169,76,255,.95),rgba(94,58,255,.9));box-shadow:0 0 28px rgba(169,76,255,.42)}
    .page{max-width:1540px;margin:0 auto;padding:18px clamp(10px,2vw,28px) 30px}.controls{display:grid;grid-template-columns:minmax(220px,1fr) 180px 180px auto;gap:12px;margin-bottom:16px;padding:14px;background:var(--tc-panel);border:1px solid var(--tc-line);border-radius:22px;box-shadow:0 16px 60px rgba(0,0,0,.35)}
    .input,.btn{border-radius:14px!important;border:1px solid rgba(190,130,255,.26)!important;background:rgba(255,255,255,.055)!important;color:var(--tc-text)!important}.btn{background:linear-gradient(135deg,rgba(169,76,255,.8),rgba(245,199,91,.2))!important}
    #statusText{color:var(--tc-muted);margin:10px 4px 14px}.rosterGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}.unitCard{border:1px solid var(--tc-line)!important;background:linear-gradient(180deg,rgba(24,20,48,.9),rgba(8,8,22,.95))!important;border-radius:20px!important;box-shadow:0 16px 45px rgba(0,0,0,.36),inset 0 1px 0 rgba(255,255,255,.06);overflow:hidden;transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease}.unitCard:hover{transform:translateY(-2px);border-color:rgba(245,199,91,.55)!important;box-shadow:0 20px 65px rgba(0,0,0,.46),0 0 28px rgba(169,76,255,.18)}
    .unitThumb{border-radius:18px!important;background:radial-gradient(circle at 50% 15%,rgba(245,199,91,.12),transparent 44%),rgba(0,0,0,.24)!important;border:1px solid rgba(255,255,255,.08);overflow:hidden}.unitThumb img{object-fit:cover}.unitName{font-size:19px;font-weight:900;color:#fff}.unitTitle{color:var(--tc-gold)!important;font-size:12px}.tag{border-radius:999px!important;border:1px solid rgba(255,255,255,.12)!important;background:rgba(255,255,255,.07)!important}.tag.rarity{color:#171006!important;background:linear-gradient(135deg,#f7d46e,#b87920)!important}.tag.element{color:#fff!important}.stateRow{display:flex;align-items:center;gap:7px;flex-wrap:wrap}.stateBtn{width:24px!important;height:24px!important;border-radius:999px!important;border:1px solid rgba(255,255,255,.25)!important;background:rgba(255,255,255,.08)!important}.stateBtn.active{background:linear-gradient(135deg,var(--tc-gold),#8d56ff)!important;box-shadow:0 0 18px rgba(245,199,91,.5)}.duoFormBtn{border-radius:999px!important;background:linear-gradient(135deg,rgba(245,199,91,.88),rgba(169,76,255,.8))!important;color:#090514!important;border:0!important;max-width:140px!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important}
    .statLine,.panel,.leaderBlock{background:rgba(255,255,255,.045)!important;border:1px solid rgba(255,255,255,.075)!important;border-radius:15px!important}.panelTitle,.leaderName{color:var(--tc-gold)!important}.descriptionText,.leaderDesc,.muted{color:#d8d2e8!important}.skillBox{background:rgba(0,0,0,.2)!important;border:1px solid rgba(255,255,255,.08)!important;border-radius:12px!important}.footerHint{color:var(--tc-muted);opacity:.8}
    @media(max-width:760px){.controls{grid-template-columns:1fr 1fr}.controls input{grid-column:1/-1}.rosterGrid{grid-template-columns:1fr}.page{padding-inline:10px}.unitCard{border-radius:18px!important}}
  </style>
</head>
<body class="page-catalog mobile-compact">
  <header class="topbar">
    <div class="topbar-inner">
      <div>
        <div class="brandTitle">DUO Catalog</div>
        <div class="brandSub">Clean test UI • Catalog only</div>
      </div>
      <nav class="tabs">
        <a class="tab active" href="./test-catalog.html">Test Catalog</a>
        <a class="tab" href="./index.html">Live Catalog</a>
        <a class="tab" href="./optimizer.html">Optimizer</a>
      </nav>
    </div>
  </header>
  <main class="page">
    <div class="controls">
      <input id="catalogSearch" class="input" type="search" placeholder="Search characters, weapons, accessories, bosses..." />
      <select id="catalogType" class="input" aria-label="Catalog type"><option value="all">All</option><option value="characters">Characters</option><option value="weapons">Weapons</option><option value="accessories">Accessories</option><option value="bosses">Bosses</option></select>
      <select id="catalogSort" class="input" aria-label="Catalog sort"><option value="newest">Newest Added</option><option value="oldest">Oldest Added</option><option value="az">A–Z</option><option value="za">Z–A</option></select>
      <button id="viewToggle" class="btn" type="button">View: Compact</button>
    </div>
    <div id="statusText">Loading...</div>
    <div id="catalogGrid" class="rosterGrid"></div>
    <div class="footerHint">Test page only. Optimizer layout is untouched.</div>
  </main>
  <script src="./seasonal-theme.js"></script>
  <script src="./site-menu.js"></script>
  <script src="./image-cache-reset.js?v=1"></script>
  <script src="./live-data-config.js"></script>
  <script src="./data-loader.js"></script>
  <script src="./leader-skill-resolver.js?v=1"></script>
  <script src="./duo-source-collapse.js?v=4"></script>
  <script src="./catalog.js?v=1770583866"></script>
  <script src="./catalog-sort.js?v=4"></script>
  <script src="./catalog-ui-align.js?v=2"></script>
  <script src="./catalog-description-state-fix.js?v=1"></script>
</body>
</html>
