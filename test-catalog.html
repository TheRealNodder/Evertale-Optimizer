<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Evertale Optimizer • HD Mobile Catalog</title>
<style>
:root{--bg:#05040d;--panel:#111025;--panel2:#191435;--line:rgba(190,124,255,.28);--gold:#f6c85f;--purple:#8b42ff;--purple2:#c04cff;--text:#faf6ff;--muted:#bfb4d6;--fire:#f05245;--water:#49a8ff;--storm:#f7d94a;--earth:#58d16d;--light:#f3efe3;--dark:#9d62ff}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}body{background:radial-gradient(circle at 12% -5%,rgba(139,66,255,.35),transparent 32%),radial-gradient(circle at 105% 2%,rgba(246,200,95,.18),transparent 24%),linear-gradient(180deg,#05040d,#080618 55%,#04030b);padding-bottom:calc(84px + env(safe-area-inset-bottom))}.app{max-width:560px;margin:0 auto;padding:12px 12px 0}.top{position:sticky;top:0;z-index:20;margin:-1px -12px 10px;padding:10px 12px 12px;background:linear-gradient(180deg,rgba(5,4,13,.96),rgba(5,4,13,.82));backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}.status{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}.logo{font-family:Georgia,serif;font-weight:900;letter-spacing:.12em;color:var(--gold);text-shadow:0 0 18px rgba(246,200,95,.4)}.tiny{font-size:11px;color:var(--muted)}.search{display:flex;gap:8px}.search input{flex:1;height:44px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.055);color:var(--text);padding:0 13px;font-size:14px;outline:none}.iconBtn,.chip{border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--text);border-radius:14px;min-width:44px;height:44px;font-weight:800}.chips{display:flex;gap:8px;overflow:auto;padding:10px 0 2px;scrollbar-width:none}.chip{height:34px;min-width:auto;padding:0 14px;white-space:nowrap}.chip.active{background:linear-gradient(135deg,var(--purple),#5b35df);box-shadow:0 0 20px rgba(139,66,255,.35)}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.card{position:relative;overflow:hidden;min-height:216px;border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,rgba(25,20,53,.9),rgba(9,8,22,.98));box-shadow:0 16px 40px rgba(0,0,0,.35)}.card:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 22%,rgba(246,200,95,.12),transparent 40%);pointer-events:none}.art{position:relative;height:150px;display:flex;align-items:flex-start;justify-content:center;overflow:hidden}.art img{width:100%;height:168px;object-fit:cover;object-position:center top;filter:drop-shadow(0 12px 22px rgba(0,0,0,.5))}.meta{position:relative;padding:7px 9px 10px}.rarity{position:absolute;top:-30px;left:8px;padding:3px 7px;border-radius:7px;background:linear-gradient(135deg,#ffe08a,#b87821);color:#160f05;font-size:11px;font-weight:950}.name{font-size:14px;font-weight:950;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.title{font-size:11px;color:var(--muted);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}.badges{display:flex;align-items:center;gap:5px;margin-top:7px}.dot{width:18px;height:18px;border-radius:50%;border:1px solid rgba(255,255,255,.22)}.el-fire{background:var(--fire)}.el-water{background:var(--water)}.el-storm{background:var(--storm)}.el-earth{background:var(--earth)}.el-light{background:var(--light)}.el-dark{background:var(--dark)}.stars{margin-left:auto;color:var(--gold);font-size:12px}.sheet{position:fixed;inset:0;z-index:60;background:rgba(4,3,11,.72);backdrop-filter:blur(10px);display:none}.sheet.open{display:block}.sheetInner{position:absolute;inset:0;overflow:auto;background:radial-gradient(circle at 50% 0%,rgba(139,66,255,.32),transparent 35%),linear-gradient(180deg,#080616,#05040d);padding-bottom:calc(96px + env(safe-area-inset-bottom))}.hero{position:relative;min-height:430px;overflow:hidden;padding:16px 14px 0}.hero:after{content:"";position:absolute;left:0;right:0;bottom:0;height:45%;background:linear-gradient(transparent,#05040d)}.sheetTop{position:relative;z-index:3;display:flex;justify-content:space-between;align-items:center}.back,.fav{width:42px;height:42px;border-radius:50%;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);color:white;font-size:20px}.heroImg{position:absolute;inset:58px 0 0;display:flex;justify-content:center;align-items:flex-start}.heroImg img{width:min(96vw,430px);height:390px;object-fit:contain;filter:drop-shadow(0 24px 34px rgba(0,0,0,.65))}.heroText{position:relative;z-index:3;margin-top:265px}.heroName{font-size:34px;font-weight:950;line-height:1;margin-bottom:5px;text-shadow:0 2px 20px #000}.heroTitle{color:var(--muted);font-size:15px}.tagRow{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.tag{border-radius:999px;padding:7px 10px;background:rgba(255,255,255,.075);border:1px solid rgba(255,255,255,.10);font-size:12px;font-weight:800}.awakening{padding:0 14px 12px}.label{font-size:12px;letter-spacing:.12em;color:var(--muted);font-weight:900;text-transform:uppercase;margin-bottom:10px}.stateBtns{display:flex;gap:12px}.state{width:46px;height:46px;border-radius:50%;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.055);color:white;font-weight:950}.state.active{border-color:var(--gold);background:linear-gradient(135deg,rgba(246,200,95,.35),rgba(139,66,255,.52));box-shadow:0 0 22px rgba(246,200,95,.35)}.tabs2{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:rgba(11,9,25,.86);position:sticky;top:0;z-index:5}.tab2{height:48px;border:0;background:transparent;color:var(--muted);font-weight:850}.tab2.active{color:white;background:linear-gradient(180deg,rgba(139,66,255,.45),rgba(139,66,255,0));border-bottom:2px solid var(--purple2)}.content{padding:16px 14px}.panel{border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.045);padding:14px;line-height:1.5;color:#eee8fa}.skill{display:flex;gap:10px;padding:12px;border-radius:15px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);margin-bottom:10px}.orb{width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,var(--purple),var(--gold));flex:0 0 auto}.skill b{display:block}.skill small{color:var(--muted)}.statGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.stat{padding:14px;border-radius:16px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08)}.stat span{display:block;color:var(--muted);font-size:12px}.stat b{font-size:18px}.bottom{position:fixed;z-index:40;left:50%;bottom:0;transform:translateX(-50%);width:min(560px,100%);padding:8px 12px calc(8px + env(safe-area-inset-bottom));background:rgba(5,4,13,.86);backdrop-filter:blur(18px);border-top:1px solid var(--line)}.nav{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.nav a{height:52px;border-radius:16px;color:var(--muted);text-decoration:none;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)}.nav a.active{color:white;background:linear-gradient(135deg,rgba(139,66,255,.8),rgba(91,59,255,.45))}.empty{padding:40px;text-align:center;color:var(--muted)}@media(min-width:760px){body{padding-bottom:0}.app{max-width:1180px}.grid{grid-template-columns:repeat(auto-fill,minmax(190px,1fr))}.sheetInner{max-width:560px;left:50%;transform:translateX(-50%);box-shadow:0 0 0 1px var(--line),0 0 80px #000}.bottom{display:none}}
</style>
</head>
<body>
<div class="app"><header class="top"><div class="status"><div><div class="logo">HD MOBILE CATALOG</div><div class="tiny" id="count">Loading characters…</div></div><button class="iconBtn" id="filterBtn">☰</button></div><div class="search"><input id="search" placeholder="Search characters…" autocomplete="off"><button class="iconBtn" id="clearBtn">×</button></div><div class="chips" id="chips"><button class="chip active" data-filter="all">All</button><button class="chip" data-filter="SSR">SSR</button><button class="chip" data-filter="SR">SR</button><button class="chip" data-filter="R">R</button><button class="chip" data-filter="N">N</button></div></header><main class="grid" id="grid"></main></div>
<div class="sheet" id="sheet"><div class="sheetInner"><section class="hero"><div class="sheetTop"><button class="back" id="back">‹</button><button class="fav">☆</button></div><div class="heroImg" id="heroImg"></div><div class="heroText"><div class="heroName" id="heroName"></div><div class="heroTitle" id="heroTitle"></div><div class="tagRow" id="tagRow"></div></div></section><section class="awakening"><div class="label">Awakening</div><div class="stateBtns" id="stateBtns"></div></section><nav class="tabs2"><button class="tab2 active" data-tab="desc">Description</button><button class="tab2" data-tab="skills">Skills</button><button class="tab2" data-tab="stats">Stats</button><button class="tab2" data-tab="info">Info</button></nav><section class="content" id="content"></section></div></div>
<footer class="bottom"><nav class="nav"><a class="active" href="./test-catalog.html">▦<span>Catalog</span></a><a href="./optimizer.html">✦<span>Optimizer</span></a><a href="./roster.html">♟<span>Team</span></a><a href="./index.html">●<span>Live</span></a></nav></footer>
<script>
(function(){
const BUNDLE='./apkfiles/entries/bundles/character_families.bundle.json';
let all=[],shown=[],active=null,stateIdx=0,tab='desc',rarity='all';
const $=id=>document.getElementById(id);const clean=s=>String(s||'').toLowerCase();
function elClass(e){e=clean(e).replace(/[^a-z]/g,'');if(e.includes('fire'))return'el-fire';if(e.includes('water'))return'el-water';if(e.includes('storm')||e.includes('air')||e.includes('wind'))return'el-storm';if(e.includes('earth'))return'el-earth';if(e.includes('light')||e.includes('life'))return'el-light';if(e.includes('dark')||e.includes('death'))return'el-dark';return'el-dark'}
function imgOf(c,i=0){return (c.states&&c.states[i]&&c.states[i].image)||c.image||''}
function descOf(c,i=0){return (c.states&&c.states[i]&&(c.states[i].description||''))||c.description||''}
function stateName(c,i=0){return (c.states&&c.states[i]&&(c.states[i].name||c.states[i].title))||c.name||c.family||''}
function stateTitle(c,i=0){return (c.states&&c.states[i]&&(c.states[i].title||''))||c.title||''}
function normalize(e){return{family:e.family||e.id||'',name:e.name||e.family||'',title:e.title||'',rarity:e.rarity||'',element:e.element||'',image:e.image||'',states:(e.states||[]).slice(0,3),leader:e.leaderSkill||{},activeSkills:e.activeSkills||[],passiveSkills:e.passiveSkillDetails||[],stats:e.stats||{atk:e.atk,hp:e.hp,spd:e.spd,cost:e.cost},order:e.fileHandleOrder??e.order??0}}
async function init(){const r=await fetch(BUNDLE,{cache:'no-store'});const j=await r.json();all=(j.entries||[]).map(normalize).sort((a,b)=>(b.order||0)-(a.order||0));bind();render()}
function bind(){$('search').addEventListener('input',render);$('clearBtn').onclick=()=>{$('search').value='';render()};$('chips').onclick=e=>{const b=e.target.closest('.chip');if(!b)return;rarity=b.dataset.filter;document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));b.classList.add('active');render()};$('grid').onclick=e=>{const card=e.target.closest('.card');if(card)open(shown[+card.dataset.i])};$('back').onclick=()=>{$('sheet').classList.remove('open')};document.querySelector('.tabs2').onclick=e=>{const b=e.target.closest('.tab2');if(!b)return;tab=b.dataset.tab;document.querySelectorAll('.tab2').forEach(x=>x.classList.toggle('active',x===b));drawContent()};$('stateBtns').onclick=e=>{const b=e.target.closest('.state');if(!b)return;stateIdx=+b.dataset.i;drawSheet()}}
function render(){const q=clean($('search').value);shown=all.filter(c=>(rarity==='all'||c.rarity===rarity)&&(!q||clean(c.name+' '+c.title+' '+c.family).includes(q)));$('count').textContent=`${shown.length} characters`;$('grid').innerHTML=shown.length?shown.map((c,i)=>`<article class="card" data-i="${i}"><div class="art"><img loading="lazy" src="${imgOf(c,0)}" alt=""></div><div class="meta"><div class="rarity">${c.rarity||'?'}</div><div class="name">${c.name}</div><div class="title">${c.title||c.family}</div><div class="badges"><span class="dot ${elClass(c.element)}"></span><span class="stars">${(c.states||[]).length||1}★</span></div></div></article>`).join(''):'<div class="empty">No matches</div>'}
function open(c){active=c;stateIdx=0;tab='desc';document.querySelectorAll('.tab2').forEach(x=>x.classList.toggle('active',x.dataset.tab==='desc'));$('sheet').classList.add('open');drawSheet()}
function drawSheet(){if(!active)return;const img=imgOf(active,stateIdx);$('heroImg').innerHTML=img?`<img src="${img}" alt="">`:'';$('heroName').textContent=stateName(active,stateIdx);$('heroTitle').textContent=stateTitle(active,stateIdx)||active.family;$('tagRow').innerHTML=`<span class="tag">${active.rarity||'?'}</span><span class="tag">${active.element||'Element'}</span><span class="tag">${active.family}</span>`;const count=Math.max((active.states||[]).length,1);$('stateBtns').innerHTML=Array.from({length:count},(_,i)=>`<button class="state ${i===stateIdx?'active':''}" data-i="${i}">${i+1}</button>`).join('');drawContent()}
function drawContent(){if(!active)return;const s=active.stats||{};if(tab==='desc'){$('content').innerHTML=`<div class="panel"><b>Awakening ${stateIdx+1}/${Math.max(active.states.length,1)}</b><br><br>${descOf(active,stateIdx)||'No description loaded for this state.'}</div>`;return}if(tab==='stats'){$('content').innerHTML=`<div class="statGrid"><div class="stat"><span>HP</span><b>${s.hp||'—'}</b></div><div class="stat"><span>ATK</span><b>${s.atk||'—'}</b></div><div class="stat"><span>SPD</span><b>${s.spd||'—'}</b></div><div class="stat"><span>COST</span><b>${s.cost||'—'}</b></div></div>`;return}if(tab==='skills'){const skills=[...(active.activeSkills||[]),...(active.passiveSkills||[])].slice(0,10);$('content').innerHTML=skills.length?skills.map(x=>`<div class="skill"><div class="orb"></div><div><b>${x.name||'Skill'}</b><small>${x.description||''}</small></div></div>`).join(''):'<div class="panel">No skills loaded.</div>';return}$('content').innerHTML=`<div class="panel"><b>${active.family}</b><br>Rarity: ${active.rarity||'—'}<br>Element: ${active.element||'—'}<br>States: ${Math.max(active.states.length,1)}</div>`}
init().catch(err=>{$('grid').innerHTML='<div class="empty">Failed to load catalog.</div>';console.error(err)})
})();
</script>
</body>
</html>
