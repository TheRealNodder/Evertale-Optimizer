  <style>
    :root{--bg:#04030b;--panel:rgba(13,10,28,.92);--card:rgba(19,15,40,.92);--line:rgba(211,155,255,.26);--gold:#f6ca5e;--purple:#a855f7;--text:#fbf7ff;--muted:#c5badb}*{box-sizing:border-box}html,body{background:#04030b!important;color:var(--text)!important}body{min-height:100vh;background:radial-gradient(circle at 8% 0%,rgba(168,85,247,.28),transparent 30%),radial-gradient(circle at 92% 5%,rgba(246,202,94,.18),transparent 25%),linear-gradient(180deg,#04030b,#070511 45%,#03030a)!important}.topbar,.siteMenu,.seasonalTheme,.themeOverlay{background:rgba(4,3,11,.82)!important;backdrop-filter:blur(18px);border-bottom:1px solid var(--line)!important;box-shadow:0 14px 44px rgba(0,0,0,.42)!important}.brandTitle{font-size:24px!important;letter-spacing:.08em;text-transform:uppercase;color:var(--gold)!important;text-shadow:0 0 18px rgba(246,202,94,.35)}.brandSub{color:var(--muted)!important}.tabs{gap:10px}.tab{border-radius:999px!important;background:rgba(255,255,255,.045)!important;border:1px solid rgba(255,255,255,.08)!important;color:var(--muted)!important}.tab.active{background:linear-gradient(135deg,rgba(168,85,247,.95),rgba(91,59,255,.88))!important;color:#fff!important;box-shadow:0 0 28px rgba(168,85,247,.35)}.page{max-width:1600px;margin:auto;padding:16px clamp(10px,2vw,26px) 34px!important}.v2-shell{display:grid;grid-template-columns:280px minmax(0,1fr);gap:16px}.v2-sidebar,.v2-panel,.v2-grid-panel{background:linear-gradient(180deg,rgba(18,14,36,.92),rgba(6,5,14,.96))!important;border:1px solid var(--line)!important;border-radius:24px!important;box-shadow:0 18px 55px rgba(0,0,0,.38)!important}.v2-sidebar{position:sticky;top:96px;height:calc(100vh - 116px);overflow:auto;padding:14px}.v2-side-title,.v2-kicker,.v2-desc-head h2,.panelTitle,.leaderName{color:var(--gold)!important}.controls{display:flex!important;flex-direction:column!important;gap:10px!important;padding:0!important;margin:0!important;background:transparent!important;border:0!important;box-shadow:none!important}.input,.btn{width:100%;border-radius:15px!important;border:1px solid rgba(211,155,255,.24)!important;background:rgba(255,255,255,.06)!important;color:var(--text)!important;min-height:42px}.btn{background:linear-gradient(135deg,rgba(168,85,247,.85),rgba(246,202,94,.20))!important;font-weight:800}.v2-main{min-width:0}.v2-hero{display:grid;grid-template-columns:minmax(280px,420px) minmax(0,1fr) minmax(310px,420px);gap:16px;margin-bottom:16px}.v2-feature-art{min-height:380px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}.v2-feature-art:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 25%,rgba(246,202,94,.16),transparent 40%),radial-gradient(circle at 50% 70%,rgba(168,85,247,.22),transparent 50%)}.v2-feature-art img{position:relative;z-index:1;max-width:100%;max-height:360px;object-fit:contain;filter:drop-shadow(0 18px 35px rgba(0,0,0,.55))}.v2-feature-info,.v2-description{padding:20px}.v2-name{font-size:40px;line-height:1;margin:8px 0 5px;font-weight:950}.v2-title,.v2-desc-text,.muted,.descriptionText,.leaderDesc{color:#ded7ee!important}.v2-pill-row{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.v2-pill{border-radius:999px;padding:6px 10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.10);font-size:12px;font-weight:800}.v2-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px}.v2-stat{padding:12px;border-radius:16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08)}.v2-stat span{display:block;font-size:11px;color:var(--muted)}.v2-desc-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.v2-awaken-tabs{display:flex;gap:7px}.v2-awaken-tabs button,.stateBtn{width:28px!important;height:28px!important;border-radius:999px!important;border:1px solid rgba(255,255,255,.24)!important;background:rgba(255,255,255,.075)!important;color:#fff!important;font-weight:900}.v2-awaken-tabs button.active,.stateBtn.active{background:linear-gradient(135deg,var(--gold),var(--purple))!important;box-shadow:0 0 16px rgba(246,202,94,.48)!important}.v2-desc-text{min-height:146px;white-space:pre-wrap;line-height:1.5}.v2-grid-panel{padding:14px}.v2-grid-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0 0 12px}.v2-grid-head h2{margin:0;font-size:20px;letter-spacing:.08em;text-transform:uppercase}.rosterGrid{display:grid!important;grid-template-columns:repeat(auto-fill,minmax(260px,1fr))!important;gap:13px!important}.unitCard{border:1px solid var(--line)!important;background:linear-gradient(180deg,rgba(21,17,43,.92),rgba(8,7,18,.98))!important;border-radius:22px!important;box-shadow:0 16px 44px rgba(0,0,0,.34)!important;overflow:hidden!important}.unitCard:hover,.unitCard.v2-selected{transform:translateY(-2px);border-color:rgba(246,202,94,.62)!important;box-shadow:0 22px 64px rgba(0,0,0,.48),0 0 28px rgba(168,85,247,.22)!important}.unitThumb{border-radius:18px!important;background:radial-gradient(circle at 50% 12%,rgba(246,202,94,.13),transparent 44%),rgba(0,0,0,.28)!important;border:1px solid rgba(255,255,255,.08)!important;overflow:hidden!important}.unitName{color:white!important;font-weight:950!important}.unitTitle{color:var(--gold)!important}.tag{border-radius:999px!important;border:1px solid rgba(255,255,255,.12)!important;background:rgba(255,255,255,.07)!important;color:#f5f0ff!important}.tag.rarity{color:#160f05!important;background:linear-gradient(135deg,#ffe083,#b5761d)!important}.stateRow{display:flex!important;align-items:center!important;gap:7px!important;flex-wrap:wrap!important}.duoFormBtn{border-radius:999px!important;background:linear-gradient(135deg,rgba(246,202,94,.92),rgba(168,85,247,.82))!important;color:#090511!important;border:0!important;max-width:140px!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important}.panel,.leaderBlock,.statLine,.skillBox{background:rgba(255,255,255,.045)!important;border:1px solid rgba(255,255,255,.075)!important;border-radius:15px!important}.footerHint{display:none}@media(max-width:1180px){.v2-shell{grid-template-columns:1fr}.v2-sidebar{position:static;height:auto}.controls{display:grid!important;grid-template-columns:1fr 1fr!important}.controls input{grid-column:1/-1}.v2-hero{grid-template-columns:1fr}.v2-feature-art{min-height:320px}.v2-name{font-size:34px}}@media(max-width:680px){.controls{grid-template-columns:1fr!important}.rosterGrid{grid-template-columns:1fr!important}.v2-stats{grid-template-columns:repeat(2,1fr)}.v2-name{font-size:29px}}

<body class="page-catalog mobile-compact test-catalog-v2">
  <header class="topbar"><div class="topbar-inner"><div><div class="brandTitle">DUO Catalog</div><div class="brandSub">Clean test UI • optimizer untouched</div></div><nav class="tabs"><a class="tab active" href="./test-catalog.html">Test Catalog</a><a class="tab" href="./index.html">Live Catalog</a><a class="tab" href="./optimizer.html">Optimizer</a></nav></div></header>
  <main class="page"><div class="v2-shell"><aside class="v2-sidebar"><div class="v2-side-title">Filters</div><div class="controls"><input id="catalogSearch" class="input" type="search" placeholder="Search characters, weapons, accessories, bosses..." /><select id="catalogType" class="input"><option value="all">All</option><option value="characters">Characters</option><option value="weapons">Weapons</option><option value="accessories">Accessories</option><option value="bosses">Bosses</option></select><select id="catalogSort" class="input"><option value="newest">Newest Added</option><option value="oldest">Oldest Added</option><option value="az">A–Z</option><option value="za">Z–A</option></select><button id="viewToggle" class="btn" type="button">View: Compact</button></div></aside><section class="v2-main"><section class="v2-hero"><div class="v2-panel v2-feature-art" id="v2FeatureArt"><div>Select a character</div></div><div class="v2-panel v2-feature-info"><div class="v2-kicker" id="v2Kind">Catalog Preview</div><div class="v2-name" id="v2Name">Loading...</div><div class="v2-title" id="v2Title">Choose a card below</div><div class="v2-pill-row" id="v2Pills"></div><div class="v2-stats"><div class="v2-stat"><span>HP</span><b id="v2Hp">—</b></div><div class="v2-stat"><span>ATK</span><b id="v2Atk">—</b></div><div class="v2-stat"><span>SPD</span><b id="v2Spd">—</b></div><div class="v2-stat"><span>COST</span><b id="v2Cost">—</b></div></div></div><div class="v2-panel v2-description"><div class="v2-desc-head"><h2>Descriptions</h2><div class="v2-awaken-tabs" id="v2AwakenTabs"></div></div><div class="v2-desc-text" id="v2Desc">Descriptions follow awakening/state clicks here.</div></div></section><section class="v2-grid-panel"><div class="v2-grid-head"><h2>Catalog</h2><div><span id="statusText">Loading...</span> <span id="v2Count"></span></div></div><div id="catalogGrid" class="rosterGrid"></div><div class="footerHint">Test page only.</div></section></section></div></main>
  <script src="./image-cache-reset.js?v=1"></script><script src="./live-data-config.js"></script><script src="./data-loader.js"></script><script src="./leader-skill-resolver.js?v=1"></script><script src="./duo-source-collapse.js?v=4"></script><script src="./catalog.js?v=1770583866"></script><script src="./catalog-sort.js?v=4"></script><script src="./catalog-ui-align.js?v=2"></script><script src="./catalog-description-state-fix.js?v=1"></script>
  <script>(function(){const url='./apkfiles/entries/bundles/character_families.bundle.json';let map=null;const $=id=>document.getElementById(id),clean=v=>String(v||'').toLowerCase().replace(/\d+$/,'').replace(/[^a-z0-9]+/g,'');async function load(){if(map)return map;const r=await fetch(url,{cache:'no-store'}),j=await r.json(),m=new Map();(j.entries||[]).forEach(e=>{const rows=(e.states||[]).slice(0,3).map(s=>({title:s.title||'',name:s.name||'',description:s.description||'',sourceId:s.sourceId||s.dataSourceId||'',image:s.image||''}));if(!rows.length)return;[e.family,e.id,e.sourceId,e.name,e.title].forEach(v=>{const k=clean(v);if(k&&!m.has(k))m.set(k,rows)});rows.forEach(s=>{const k=clean(s.sourceId);if(k&&!m.has(k))m.set(k,rows)})});map=m;return m}function t(sel,root=document){return root.querySelector(sel)?.textContent?.trim()||''}function k(card){return [card.getAttribute('data-duo-root'),card.getAttribute('data-duo-active-id'),card.getAttribute('data-id'),t('.unitName',card),t('.unitTitle',card)].map(clean).find(Boolean)||''}function st(label,card){for(const row of card.querySelectorAll('.stat')){const lab=row.querySelector('.statLabel')?.textContent||'';if(lab.toUpperCase()===label)return row.querySelector('.statVal')?.textContent||'—'}return '—'}function idx(card){return parseInt(card.querySelector('.stateBtn.active')?.getAttribute('data-idx')||card.querySelector('.unitThumb img')?.getAttribute('data-state')||card.getAttribute('data-duo-index')||'0',10)||0}function setHero(card,rows){const img=card.querySelector('.unitThumb img')?.src||'';$('v2FeatureArt').innerHTML=img?`<img src="${img}" alt="">`:'<div>No image</div>';$('v2Kind').textContent=card.getAttribute('data-kind')||'Character';$('v2Name').textContent=t('.unitName',card)||'Unknown';$('v2Title').textContent=t('.unitTitle',card)||'';$('v2Pills').innerHTML=[...card.querySelectorAll('.tag')].map(x=>x.textContent.trim()).filter(Boolean).slice(0,5).map(p=>`<span class="v2-pill">${p}</span>`).join('');$('v2Hp').textContent=st('HP',card);$('v2Atk').textContent=st('ATK',card);$('v2Spd').textContent=st('SPD',card);$('v2Cost').textContent=st('COST',card);const i=Math.min(idx(card),Math.max((rows||[]).length-1,0));$('v2AwakenTabs').innerHTML=(rows||[]).map((r,n)=>`<button class="${n===i?'active':''}" type="button">${n+1}</button>`).join('');$('v2Desc').textContent=(rows&&rows[i]&&rows[i].description)||t('.descriptionText',card)||'No description loaded for this state.'}async function select(card){if(!card)return;document.querySelectorAll('.unitCard.v2-selected').forEach(c=>c.classList.remove('v2-selected'));card.classList.add('v2-selected');const m=await load();setHero(card,m.get(k(card))||[])}function wire(){const grid=$('catalogGrid');if(!grid)return;grid.addEventListener('click',e=>{const card=e.target.closest('.unitCard');if(card)setTimeout(()=>select(card),80)});new MutationObserver(()=>{const cards=document.querySelectorAll('.unitCard');$('v2Count').textContent=cards.length?`• ${cards.length} visible`:'';if(!document.querySelector('.unitCard.v2-selected')&&cards[0])select(cards[0])}).observe(grid,{childList:true});setTimeout(()=>{const first=document.querySelector('.unitCard');if(first)select(first)},1200)}document.addEventListener('DOMContentLoaded',wire)})();</script>
</body>
